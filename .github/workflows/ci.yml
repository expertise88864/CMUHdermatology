name: CI

# 在 push 到 main 與所有 PR 時跑;也可手動觸發。
# 用 windows-latest:本專案依賴 pywin32 / pyautogui / keyboard / pystray 等
# Windows-only 套件,測試會 import 到它們,必須在 Windows 上跑。
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pyright
          # RF-15：CI 裝 ortools 讓 tests/test_roster_solve.py 的 22 個 solver 測試真的跑
          # （requirements.txt 維持不含 ortools＝使用者機器 lazy 安裝設計）。
          # 版本與 src/cmuh_common/roster/__init__.py 的 ORTOOLS_PINNED_VERSION 同步。
          pip install "ortools==9.15.6755"
          # 防呆：裝失敗立即紅，避免 solver 測試退回靜默 skip 而無人察覺
          python -c "import ortools"

      - name: Ruff (真 bug 類 lint — F/E9，規則見 ruff.toml)
        run: python -m ruff check src scripts tests

      - name: Pyright (型別檢查 — 設定見 pyrightconfig.json)
        run: python -m pyright

      - name: Pytest (全測試 + import 冒煙測試)
        run: python -m pytest -q -p no:cacheprovider
